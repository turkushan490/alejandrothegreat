<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandrothegreat</title>
<link rel="icon" href="/favicon.png">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/dashboard.html">&larr; Alejandrothegreat</a>
  <div class="user-area" id="userArea"></div>
</header>
<main class="container">
  <p class="bot-label" id="botNameLabel"></p>
  <section class="card" id="nowPlayingCard">
    <div class="now-playing" id="nowPlaying">
      <p class="muted">Loading…</p>
    </div>
    <div class="progress-wrap" id="progressWrap" hidden>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-times">
        <span id="progressCurrent">0:00</span>
        <span id="progressTotal">0:00</span>
      </div>
    </div>
  </section>

  <section class="controls card" id="controls" hidden>
    <button class="ctrl-btn" id="btnPause" title="Pause">⏸️</button>
    <button class="ctrl-btn" id="btnResume" title="Resume">▶️</button>
    <button class="ctrl-btn" id="btnSkip" title="Skip">⏭️</button>
    <button class="ctrl-btn danger" id="btnStop" title="Stop">⏹️</button>
    <button class="ctrl-btn" id="btnShuffle" title="Shuffle">🔀</button>
    <button class="ctrl-btn" id="btnClear" title="Clear queue">🧹</button>
    <select id="loopMode" title="Loop mode">
      <option value="off">🔁 Loop: Off</option>
      <option value="track">🔂 Loop: Track</option>
      <option value="queue">🔁 Loop: Queue</option>
    </select>
    <div class="volume-row">
      <label for="volume">🔊</label>
      <input type="range" id="volume" min="0" max="100" value="100">
      <span id="volumeValue">100</span>
    </div>
  </section>

  <section class="search card">
    <h3 style="margin-bottom:10px">Add a song</h3>
    <form id="searchForm">
      <input type="text" id="searchInput" placeholder="Type a song name, or paste a Spotify / YouTube link…" autocomplete="off">
      <button type="submit">Play</button>
    </form>
  </section>

  <section class="queue card">
    <h3>Queue</h3>
    <ol id="queueList" class="queue-list"></ol>
  </section>

  <section class="settings card" id="settingsPanel" hidden>
    <h3>Server settings</h3>
    <div id="settingsError" class="error-banner" hidden></div>
    <form id="settingsForm">
      <label for="controlModeSelect">Who can control playback</label>
      <select id="controlModeSelect">
        <option value="everyone">Everyone</option>
        <option value="managers">Server managers only</option>
        <option value="dj-role">Specific role</option>
      </select>

      <div id="djRoleRow" hidden>
        <label for="djRoleSelect">DJ role</label>
        <select id="djRoleSelect"></select>
      </div>

      <button type="submit" class="btn btn-discord" style="width: auto; margin-top: 14px;">Save settings</button>
    </form>
  </section>
</main>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/app.js"></script>
<script src="/js/guild.js"></script>
</body>
</html>
